<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bententrade — коллективные заказы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #faf8f5;
      --bg-card: #fff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #c45c26;
      --accent-hover: #a34a1b;
      --accent-soft: #f5e6dc;
      --border: #e8e4df;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --glass: rgba(255,255,255,0.72);
      --glass-strong: rgba(255,255,255,0.86);
      --glass-border: rgba(255,255,255,0.42);
      --glass-shadow: 0 18px 44px rgba(0,0,0,0.10);
      --success: #35c759;
      --info-soft: rgba(13,71,161,0.14);
      --purple-soft: rgba(106,27,154,0.14);
      --pending-soft: rgba(230,137,31,0.14);
      --glass-btn: rgba(255,255,255,0.22);
      --glass-btn-hover: rgba(255,255,255,0.30);
      --glass-btn-border: rgba(255,255,255,0.26);
      --pad: 14px;
      --font: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body[data-theme="dark"] {
      --bg: #0f0f10;
      --bg-card: #17171a;
      --text: #f5f5f7;
      --text-muted: rgba(245,245,247,0.68);
      --accent: #d26a32;
      --accent-hover: #b85b2b;
      --accent-soft: rgba(210,106,50,0.18);
      --border: rgba(255,255,255,0.10);
      --shadow: 0 10px 28px rgba(0,0,0,0.40);
      --glass: rgba(23,23,26,0.62);
      --glass-strong: rgba(23,23,26,0.78);
      --glass-border: rgba(255,255,255,0.12);
      --glass-shadow: 0 22px 56px rgba(0,0,0,0.55);
      --success: #35c759;
      --info-soft: rgba(13,71,161,0.14);
      --purple-soft: rgba(106,27,154,0.14);
      --pending-soft: rgba(230,137,31,0.14);
      --glass-btn: rgba(255,255,255,0.12);
      --glass-btn-hover: rgba(255,255,255,0.18);
      --glass-btn-border: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: var(--pad);
      padding-bottom: 100px;
      min-height: 100vh;
    }
    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .glass.strong { background: var(--glass-strong); }
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(249,239,231,0.82) 100%);
      box-shadow: var(--glass-shadow);
      border: 1px solid rgba(255,255,255,0.50);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    body[data-theme="dark"] .header {
      background: linear-gradient(135deg, rgba(23,23,26,0.86) 0%, rgba(32,24,20,0.70) 100%);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .theme-toggle {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 999px;
      background: var(--glass-strong);
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }
    .theme-toggle:active { transform: scale(0.98); }
    .header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }
    .header .brand { color: var(--accent); }
    .header-copy {
      min-width: 0;
    }
    .header-subtitle {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      max-width: 210px;
      line-height: 1.4;
    }
    .lang-switcher {
      display: flex;
      gap: 6px;
      background: var(--glass-strong);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .lang-switcher button {
      border: none;
      border-radius: 999px;
      padding: 8px 10px;
      background: transparent;
      color: var(--text-muted);
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }
    .lang-switcher button.active {
      background: var(--accent);
      color: #fff;
    }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--glass-strong);
      padding: 4px;
      border-radius: var(--radius-sm);
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .tabs button {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
    }
    .tabs button:hover { color: var(--text); }
    .tabs button.active {
      background: var(--accent);
      color: #fff;
    }
    .view { display: none; }
    .view.active { display: block; animation: viewIn 0.24s ease; }
    @keyframes viewIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading-skeleton {
      position: relative;
      overflow: hidden;
      background: var(--glass);
      border-radius: var(--radius);
      margin-bottom: 14px;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .loading-skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.52), transparent);
      animation: shimmer 1.35s infinite;
    }
    body[data-theme="dark"] .loading-skeleton::after {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
    }
    .loading-skeleton.catalog {
      min-height: 360px;
    }
    .loading-skeleton.cart,
    .loading-skeleton.order {
      min-height: 140px;
      padding: var(--pad);
    }
    .loading-skeleton .hero {
      height: 210px;
      background: linear-gradient(180deg, rgba(235,229,223,0.92) 0%, rgba(222,214,207,0.86) 100%);
    }
    body[data-theme="dark"] .loading-skeleton .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.06) 100%);
    }
    .loading-skeleton .body {
      padding: 14px;
    }
    .loading-skeleton .line {
      height: 12px;
      border-radius: 999px;
      background: rgba(237,231,225,0.88);
      margin-bottom: 10px;
    }
    body[data-theme="dark"] .loading-skeleton .line {
      background: rgba(255,255,255,0.10);
    }
    .loading-skeleton .line.short { width: 42%; }
    .loading-skeleton .line.mid { width: 68%; }
    .loading-skeleton .chips {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    .loading-skeleton .chip {
      width: 72px;
      height: 28px;
      border-radius: 999px;
      background: rgba(239,233,227,0.88);
    }
    body[data-theme="dark"] .loading-skeleton .chip {
      background: rgba(255,255,255,0.10);
    }
    .loading-skeleton .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .loading-skeleton .btn {
      height: 40px;
      border-radius: 12px;
      background: rgba(236,228,220,0.88);
    }
    body[data-theme="dark"] .loading-skeleton .btn {
      background: rgba(255,255,255,0.10);
    }
    .loading-skeleton .btn.small { width: 40px; }
    .loading-skeleton .btn.large { flex: 1; }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    .spinner-wrap {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 20px 0;
      color: var(--text-muted);
    }
    .empty-state-card {
      background: linear-gradient(180deg, var(--glass-strong) 0%, var(--glass) 100%);
      border-radius: 22px;
      box-shadow: var(--glass-shadow);
      padding: 28px 22px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 14px; opacity: 0.9; }
    .empty-state .title { font-weight: 700; color: var(--text); margin-bottom: 8px; font-size: 1rem; }
    .empty-state .hint { font-size: 14px; line-height: 1.45; }
    .empty-state .action {
      margin-top: 16px;
    }
    .empty-state .action button {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .product-card {
      background: var(--glass);
      border-radius: var(--radius);
      padding: 0;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.22s ease;
    }
    .product-card:hover {
      transform: translateY(-1px);
      border-color: rgba(196,92,38,0.28);
    }
    .product-card:active {
      border-color: var(--accent-soft);
      transform: translateY(1px) scale(0.995);
    }
    .product-card.bump {
      animation: cardBump 0.36s ease;
    }
    @keyframes cardBump {
      0% { transform: scale(1); }
      35% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    .product-card .img-wrap {
      width: 100%;
      min-height: 220px;
      height: 220px;
      position: relative;
      flex-shrink: 0;
      background: var(--border);
    }
    .product-card .img-overlay {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
      z-index: 2;
      pointer-events: none;
    }
    .product-card .hero-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(6px);
    }
    body[data-theme="dark"] .product-card .hero-chip {
      background: rgba(23,23,26,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 26px rgba(0,0,0,0.38);
    }
    .product-card .hero-chip.soft {
      background: rgba(26,26,26,0.72);
      color: #fff;
    }
    body[data-theme="dark"] .product-card .hero-chip.soft {
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .product-card .img-wrap img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0;
    }
    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--border);
    }
    .product-card .img-wrap .no-img {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 48px;
    }
    .product-card .img-wrap .no-img.hidden { display: none; }
    .product-card .no-img {
      width: 100%;
      min-height: 140px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 48px;
    }
    .product-card .product-info {
      padding: var(--pad);
    }
    .product-info .name { font-weight: 600; font-size: 15px; margin-bottom: 4px; line-height: 1.3; }
    .product-info .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .product-info .weight { font-size: 13px; margin-bottom: 10px; }
    .product-info .stats-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .product-info .stat-pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(247,244,239,0.82);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
    }
    body[data-theme="dark"] .product-info .stat-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
    }
    .badge.open { background: var(--success-soft); color: var(--text); border: 1px solid rgba(53,199,89,0.22); }
    .badge.waiting_24h { background: var(--warning-soft); color: var(--text); border: 1px solid rgba(230,137,31,0.22); }
    .badge.closed { background: var(--danger-soft); color: var(--text); border: 1px solid rgba(198,40,40,0.22); }
    body[data-theme="dark"] .badge.open { background: var(--success-soft); color: rgba(255,255,255,0.88); border: 1px solid rgba(53,199,89,0.24); }
    body[data-theme="dark"] .badge.waiting_24h { background: var(--warning-soft); color: rgba(255,255,255,0.88); border: 1px solid rgba(230,137,31,0.24); }
    body[data-theme="dark"] .badge.closed { background: var(--danger-soft); color: rgba(255,255,255,0.88); border: 1px solid rgba(198,40,40,0.24); }
    .product-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .product-actions-wrap {
      min-height: 48px;
    }
    .product-actions button {
      width: 40px;
      height: 40px;
      padding: 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .product-actions button.cta {
      width: auto;
      min-width: 132px;
      padding: 0 14px;
      font-size: 14px;
    }
    .product-actions button:hover:not(:disabled) { background: var(--accent-hover); }
    .product-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    .product-actions button.danger {
      background: var(--glass-strong);
      color: var(--text);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .product-actions button.danger:hover:not(:disabled) { background: var(--glass); }
    body[data-theme="dark"] .product-actions button.danger { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.92); }
    body[data-theme="dark"] .product-actions button.danger:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
    .product-actions .qty {
      font-weight: 700;
      min-width: 78px;
      font-size: 15px;
      text-align: center;
      padding: 0 10px;
    }
    .price-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: var(--glass-strong);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .price-box .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .price-box .label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 700;
    }
    .price-box .value {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
    }
    .price-box .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.35;
    }
    .price-bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid var(--glass-border);
      overflow: hidden;
    }
    .price-bar .fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(196,92,38,0.25), rgba(196,92,38,0.75));
      transition: width 0.75s cubic-bezier(0.2, 0.9, 0.2, 1);
    }
    .price-legend {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .price-tier {
      border-radius: 12px;
      padding: 8px 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.08);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .price-tier .tier-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .price-tier .tier-value {
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
    }
    .price-tier.active {
      border-color: rgba(196,92,38,0.40);
      background: rgba(196,92,38,0.12);
      transform: translateY(-1px);
    }
    .price-tier:hover { transform: translateY(-1px); }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
    .qty.bump {
      animation: qtyPulse 0.28s ease;
    }
    .sticky-cart-bar .value.bump {
      animation: qtyPulse 0.28s ease;
    }
    @keyframes qtyPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); color: var(--accent); }
      100% { transform: scale(1); }
    }

    .cart-item {
      background: var(--glass);
      border-radius: var(--radius);
      padding: var(--pad);
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .cart-item .top {
      width: 100%;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .cart-item .cart-item-img {
      width: 88px;
      height: 88px;
      flex-shrink: 0;
      border-radius: 10px;
      object-fit: cover;
      background: var(--border);
    }
    .cart-item .cart-item-no-img {
      width: 88px;
      height: 88px;
      flex-shrink: 0;
      background: var(--accent-soft);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 20px;
    }
    .cart-item .cart-item-body { flex: 1; min-width: 0; }
    .cart-item .name { font-weight: 600; font-size: 15px; }
    .cart-item .weight { color: var(--text-muted); font-size: 14px; margin-top: 2px; }
    .cart-item .meta {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .cart-item button {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .cart-item button:hover { background: var(--accent-hover); }
    .cart-item .actions-inline .step.remove {
      background: var(--glass-strong);
      color: var(--text);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    body[data-theme="dark"] .cart-item .actions-inline .step.remove {
      background: rgba(255,255,255,0.14);

<body>
  <div class="header">
    <div class="header-copy">
      <h1><span class="brand">Bententrade</span></h1>

        <button type="button" id="lang-ru">🇷🇺 RU</button>
        <button type="button" id="lang-uz">🇺🇿 UZ</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button type="button" data-tab="catalog" class="active"></button>
    <button type="button" data-tab="orders"></button>
  </div>

  <div id="view-catalog" class="view active">
    <div id="profile-banner"></div>
    <div id="catalog-list"></div>
  </div>

  <div id="view-cart" class="view">
    <div class="back-row">
      <a class="back-link" id="cart-back"></a>
    </div>
    <h2 class="view-title" id="cart-title"></h2>
    <div id="cart-summary"></div>
    <div id="cart-list"></div>
  </div>

  <div id="view-orders" class="view">
    <h2 class="view-title" id="orders-title"></h2>
    <div class="section-filters" id="orders-filters"></div>
    <div id="orders-list"></div>
  </div>

  <div id="view-checkout" class="view">
    <a class="back-link" id="checkout-back"></a>
    <h2 class="view-title" id="checkout-title"></h2>
    <div class="checkout-summary" id="checkout-summary"></div>
    <form id="checkout-form">
      <input type="hidden" id="checkout-product-id" />
      <div class="form-group">
        <label id="fulfillment-type-label" for="fulfillment-type"></label>
        <select id="fulfillment-type" required>
          <option value="pickup"></option>
          <option value="delivery"></option>
          <option value="uzum_market"></option>
        </select>
      </div>
      <div class="form-group delivery-collapsible" id="delivery-address-group" style="display: none;">
        <label id="delivery-address-label" for="delivery-address"></label>
        <input type="text" id="delivery-address" maxlength="500" />
        <div class="hint" id="delivery-address-hint"></div>
      </div>

        <label id="comment-label" for="comment"></label>
        <textarea id="comment" maxlength="1000"></textarea>
        <div class="hint" id="comment-hint"></div>
      </div>
      <div id="checkout-error" class="error-msg"></div>
      <div id="checkout-success" class="success-msg"></div>
      <div class="form-actions">
        <button type="submit" id="checkout-submit"></button>

      function getInitData() {
        var runtimeInitData = tg && tg.initData ? tg.initData : '';
        if (runtimeInitData) {
          try { sessionStorage.setItem('telegram_init_data', runtimeInitData); } catch (_) {}
          return runtimeInitData;

        try {
          var cachedInitData = sessionStorage.getItem('telegram_init_data');

        try {

      async function waitForInitData(timeoutMs) {
        var startedAt = Date.now();
        var limit = typeof timeoutMs === 'number' ? timeoutMs : 1500;
        while (Date.now() - startedAt < limit) {

          if (data) return data;
          await new Promise(function(resolve) { setTimeout(resolve, 60); });
        }
        return getInitData();

      async function api(path, options) {
        let res;
        try {
          res = await fetch(API_BASE + path, {
            ...(options || {}),
            headers: { ...headers(), ...((options && options.headers) || {}) }
          });
        } catch (_) {
          throw new Error(t('networkError'));
        }

        let data = null;
        try {
          data = await res.json();
        } catch (_) {
          data = null;
        }

        function mapApiMessage(resp, body) {
          var message = (body && body.error && body.error.message) || resp.statusText || 'Error';
          var code = body && body.error && body.error.code;
          if (resp.status === 401 || code === 'init_data_required') return t('initDataRequired');
          if (code === 'validation_error') {
            if (message === 'user_phone_required') return t('errUserPhoneRequired');
            if (message === 'invalid_phone') return t('errInvalidPhone');
            if (message === 'minimum_order_5kg') return t('errMinimumOrder5kg');
            if (message === 'maximum_order_exceeded') return t('errMaximumOrderExceeded');
            if (message === 'delivery_address_required') return t('errDeliveryAddressRequired');
            if (message === 'product_batch_closed') return t('checkoutBatchClosed');
            if (message === 'cannot_decrease_below_zero') return t('errCannotDecreaseBelowZero');
            if (message === 'cart_empty_for_product') return t('cartEmptyHint');
          }
          if (code === 'internal_error') {
            return currentLang === 'uz' ? 'Serverda xatolik. Keyinroq urinib ko‘ring.' : 'Ошибка на сервере. Попробуйте позже.';
          }
          return message;
        }

        var msg = mapApiMessage(res, data);
        if (!res.ok) throw new Error(msg);
        if (data && data.ok === false) throw new Error(msg);
        return data ? data.result : null;
      }

      function t(key) {

        var hours = ('0' + d.getHours()).slice(-2);
        var minutes = ('0' + d.getMinutes()).slice(-2);
        return day + '.' + month + ', ' + hours + ':' + minutes;

      }

      function fulfillmentLabel(value) {
        if (value === 'pickup') return t('fulfillmentPickup');
        if (value === 'delivery') return t('fulfillmentDelivery');
        if (value === 'uzum_market') return t('fulfillmentUzum');
        return value || '';
      }

      function fulfillmentIcon(value) {
        if (value === 'pickup') return '🏬';
        if (value === 'delivery') return '🚚';
        if (value === 'uzum_market') return '📦';
        return '•';
      }

      function statusIcon(value) {
        if (value === 'pending') return '🕓';
        if (value === 'confirmed') return '✅';
        if (value === 'completed') return '📬';
        if (value === 'received') return '🎉';
        if (value === 'cancelled') return '✖';
        return '•';
      }

      function cartItemsText(count) {
        if (currentLang === 'uz') {
          return count + ' ' + t('stickyCartItemsMany');
        }
        var mod10 = count % 10;
        var mod100 = count % 100;
        if (mod10 === 1 && mod100 !== 11) return count + ' ' + t('stickyCartItemsOne');
        if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return count + ' ' + t('stickyCartItemsFew');
        return count + ' ' + t('stickyCartItemsMany');
      }

      function formatMoney(value) {
        try {
          return new Intl.NumberFormat(currentLang === 'uz' ? 'uz-UZ' : 'ru-RU').format(Number(value) || 0);
        } catch (_) {
          return String(value);
        }
      }

      function priceTierData(totalWeight) {
        var w = Number(totalWeight) || 0;
        if (w < 100) return { tier: 1, price: 36000 };
        if (w < 300) return { tier: 2, price: 34000 };
        if (w < 500) return { tier: 3, price: 31720 };
        return { tier: 3, price: 31720 };
      }

      function priceBoxHtml(product) {
        var w = Number(product.total_weight) || 0;
        var tier = priceTierData(w);
        var fill = Math.max(0, Math.min(100, (w / 500) * 100));
        var currency = t('priceCurrency');
        var rows = [
          { id: 1, label: t('priceTier1'), price: 36000 },
          { id: 2, label: t('priceTier2'), price: 34000 },
          { id: 3, label: t('priceTier3'), price: 31720 }
        ];
        return (
          '<div class="price-box">' +
            '<div class="top">' +
              '<div class="label">' + escapeHtml(t('priceTitle')) + '</div>' +
              '<div class="value">' + escapeHtml(formatMoney(tier.price)) + ' ' + escapeHtml(currency) + '</div>' +
            '</div>' +
            '<div class="hint">' + escapeHtml(t('priceHowToGet')) + '</div>' +
            '<div class="price-bar"><div class="fill" style="width:' + fill.toFixed(1) + '%"></div></div>' +
            '<div class="price-legend">' +
              rows.map(function(r) {
                var cls = r.id === tier.tier ? 'price-tier active' : 'price-tier';
                return '<div class="' + cls + '"><div class="tier-label">' + escapeHtml(r.label) + '</div><div class="tier-value">' + escapeHtml(formatMoney(r.price)) + ' ' + escapeHtml(currency) + '</div></div>';
              }).join('') +
            '</div>' +
          '</div>'
        );
      }

      function catalogActionHtml(product, weight) {
        var closed = product.status === 'closed' || product.status === 'cancelled';
        return '<div class="product-actions">' +
          '<button type="button" data-action="remove5" data-id="' + product.id + '"' + (weight < 5 || closed ? ' disabled' : '') + ' class="danger">−</button>' +
          '<span class="qty">' + weight + ' кг</span>' +
          '<button type="button" data-action="add5" data-id="' + product.id + '"' + (closed ? ' disabled' : '') + '>+</button>' +
        '</div>';
      }

      function showToast(message) {
        var text = (message && (message.indexOf('X-Telegram-Init-Data') !== -1 || message.indexOf('init_data_required') !== -1))
          ? t('initDataRequired')
          : (message || '');
        if (tg && tg.showAlert) tg.showAlert(text);
        else alert(text);
      }

      function emptyStateHtml(icon, title, hint, actionText, actionAttr) {
        return '<div class="empty-state"><div class="empty-state-card"><div class="icon">' + icon + '</div><div class="title">' + escapeHtml(title) + '</div><div class="hint">' + escapeHtml(hint) + '</div>' + (actionText ? '<div class="action"><button type="button" ' + actionAttr + '>' + escapeHtml(actionText) + '</button></div>' : '') + '</div></div>';
      }

      function buildOrderTimeline(status) {
        var steps = [
          { key: 'pending', label: t('timelinePending') },
          { key: 'confirmed', label: t('timelineConfirmed') },
          { key: 'completed', label: t('timelineCompleted') },
          { key: 'received', label: t('timelineReceived') },
          { key: 'cancelled', label: t('timelineCancelled') }
        ];
        var activeIndex = steps.findIndex(function(step) { return step.key === status; });
        if (status === 'cancelled') {
          return '<div class="order-timeline">' + steps.map(function(step) {
            var cls = step.key === 'cancelled' ? 'timeline-step active' : 'timeline-step';
            return '<div class="' + cls + '">' + escapeHtml(step.label) + '</div>';
          }).join('') + '</div>';
        }
        return '<div class="order-timeline">' + steps.map(function(step, index) {
          if (step.key === 'cancelled') return '<div class="timeline-step">' + escapeHtml(step.label) + '</div>';
          var cls = index < activeIndex ? 'timeline-step done' : index === activeIndex ? 'timeline-step active' : 'timeline-step';
          return '<div class="' + cls + '">' + escapeHtml(step.label) + '</div>';
        }).join('') + '</div>';
      }

      function setActiveTab(tab) {
        document.querySelectorAll('.tabs button').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.tab === tab);
        });
      }

      function switchView(view) {
        currentView = view;
        document.querySelectorAll('.view').forEach(function(node) {
          node.classList.remove('active');
        });
        document.getElementById('view-' + view).classList.add('active');
        document.querySelector('.tabs').style.display = (view === 'catalog' || view === 'orders') ? 'flex' : 'none';
        if (view === 'catalog' || view === 'orders') setActiveTab(view);
        renderStickyCart();
      }

      function pulseNode(node) {
        if (!node) return;
        node.classList.remove('bump');
        void node.offsetWidth;
        node.classList.add('bump');
        setTimeout(function() { node.classList.remove('bump'); }, 280);
      }

      function animateWeightCounters(productId) {
        var catalogQty = document.querySelector('[data-product-card="' + productId + '"] .qty');
        var cartQty = document.querySelector('[data-cart-row="' + productId + '"] .qty');
        var stickyValue = document.getElementById('sticky-cart-value');
        var stickyCount = document.getElementById('sticky-cart-count');
        pulseNode(catalogQty);
        pulseNode(cartQty);
        pulseNode(stickyValue);
        pulseNode(stickyCount);
      }

      function renderSuccessScene(order) {
        var root = document.getElementById('success-scene');
        if (!root) return;
        var delivery = fulfillmentLabel(order.fulfillment_type);
        root.innerHTML =
          '<div class="icon">🎉</div>' +
          '<div class="title">' + escapeHtml(t('successTitle')) + '</div>' +
          '<div class="hint">' + escapeHtml(t('successHint')) + '</div>' +
          '<div class="hint success-steps">' + escapeHtml(t('successSteps')) + '</div>' +
          '<div class="summary-card">' +
            '<div class="title">' + escapeHtml(order.product_name || '') + '</div>' +
            '<div class="summary-grid">' +
              '<div class="summary-item"><div class="label">' + escapeHtml(t('orderWeight')) + '</div><div class="value">' + order.weight_total + ' кг</div></div>' +
              '<div class="summary-item"><div class="label">' + escapeHtml(t('orderDelivery')) + '</div><div class="value">' + escapeHtml(delivery) + '</div></div>' +
            '</div>' +
          '</div>' +
          '<div class="actions">' +
            '<button type="button" class="primary" data-success-go="orders">' + escapeHtml(t('successToOrders')) + '</button>' +
            '<button type="button" class="secondary" data-success-go="catalog">' + escapeHtml(t('successToCatalog')) + '</button>' +
          '</div>';
        root.querySelectorAll('[data-success-go]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            switchView(btn.dataset.successGo);

      function applyStaticTexts() {
        setHtmlLang();
        document.getElementById('header-subtitle').textContent = t('headerSubtitle');
        document.querySelector('[data-tab="catalog"]').textContent = t('tabCatalog');
        document.querySelector('[data-tab="orders"]').textContent = t('tabOrders');
        document.getElementById('cart-title').textContent = t('cartTitle');
        document.getElementById('orders-title').textContent = t('ordersTitle');
        document.getElementById('checkout-title').textContent = t('checkoutTitle');
        document.getElementById('cart-back').textContent = t('cartBack');
        document.getElementById('checkout-back').textContent = t('checkoutBack');
        document.getElementById('sticky-cart-title').textContent = t('stickyCartTitle');
        document.getElementById('sticky-cart-open-label').textContent = t('stickyCartButton');
        document.getElementById('fulfillment-type-label').textContent = t('fulfillmentLabel');
        document.querySelector('#fulfillment-type option[value="pickup"]').textContent = t('fulfillmentPickup');
        document.querySelector('#fulfillment-type option[value="delivery"]').textContent = t('fulfillmentDelivery');
        document.querySelector('#fulfillment-type option[value="uzum_market"]').textContent = t('fulfillmentUzum');
        document.getElementById('delivery-address-label').textContent = t('deliveryAddressLabel');
        document.getElementById('delivery-address').placeholder = t('deliveryAddressPlaceholder');
        document.getElementById('delivery-address-hint').textContent = t('deliveryAddressHint');
        document.getElementById('comment-label').textContent = t('commentLabel');
        document.getElementById('comment').placeholder = t('commentPlaceholder');
        document.getElementById('comment-hint').textContent = t('commentHint');
        document.getElementById('checkout-submit').textContent = t('checkoutSubmit');
        document.getElementById('lang-ru').classList.toggle('active', currentLang === 'ru');
        document.getElementById('lang-uz').classList.toggle('active', currentLang === 'uz');
        renderOrdersFilters();
        if (currentView === 'success' && lastSuccessOrder) {
          renderSuccessScene(lastSuccessOrder);
        }
      }

      function renderStickyCart() {
        const bar = document.getElementById('sticky-cart-bar');
        const count = cartItemsCount();
        if (count <= 0 || (currentView !== 'catalog' && currentView !== 'orders')) {
          bar.classList.remove('show');
          return;
        }
        document.getElementById('sticky-cart-value').textContent = cartItemsText(count);
        document.getElementById('sticky-cart-count').textContent = String(count);
        bar.classList.add('show');
      }

      function renderProfileBanner() {
        const banner = document.getElementById('profile-banner');
        if (!me || me.has_phone) {
          banner.innerHTML = '';
          banner.style.display = 'none';
          return;
        }
        banner.innerHTML = '<div class="banner warn">' + escapeHtml(t('profileNoPhone')) + '</div>';
        banner.style.display = 'block';
      }

      async function loadMe() {
        try {
          me = await api('/public/me');
          currentLang = (me && me.language) || currentLang || 'ru';
          setStoredLang(currentLang);
        } catch (_) {
          me = null;
          currentLang = getStoredLang() || getTelegramLanguage() || currentLang || 'ru';
        }
        applyStaticTexts();
        renderProfileBanner();
      }

      async function refreshAppState(options) {
        var opts = options || {};
        await waitForInitData(opts.initTimeoutMs || 400);
        await loadMe();
        if (opts.includeProducts) {
          await loadProducts();
        } else {
          renderCatalog();
        }
        if (opts.includeCart) {
          await loadCart();
        } else {
          renderCart();
          renderStickyCart();
        }
        if (opts.includeOrders || currentView === 'orders') {
          await loadOrders();
        } else {
          renderOrders();
        }
      }

      function refreshOnResume() {
        var now = Date.now();
        if (now - lastResumeSyncAt < 1200) return;
        lastResumeSyncAt = now;
        refreshAppState({ includeProducts: false, includeCart: false, includeOrders: currentView === 'orders', initTimeoutMs: 600 })
          .catch(function() {});
      }

      function showCatalogLoading() {
        const el = document.getElementById('catalog-list');
        el.innerHTML = [
          '<div class="loading-skeleton catalog"><div class="hero"></div><div class="body"><div class="line mid"></div><div class="line short"></div><div class="chips"><div class="chip"></div><div class="chip"></div><div class="chip"></div></div><div class="line"></div><div class="actions"><div class="btn large"></div></div></div></div>',
          '<div class="loading-skeleton catalog"><div class="hero"></div><div class="body"><div class="line mid"></div><div class="line short"></div><div class="chips"><div class="chip"></div><div class="chip"></div></div><div class="line"></div><div class="actions"><div class="btn small"></div><div class="btn small"></div><div class="btn large"></div></div></div></div>'
        ].join('');
      }

      function showCartLoading() {
        document.getElementById('cart-summary').innerHTML = '';
        document.getElementById('cart-list').innerHTML = '<div class="loading-skeleton cart"><div class="line mid"></div><div class="line short"></div><div class="chips"><div class="chip"></div><div class="chip"></div></div><div class="actions"><div class="btn small"></div><div class="btn small"></div><div class="btn large"></div></div></div>';
      }

      function showOrdersLoading() {
        document.getElementById('orders-list').innerHTML = '<div class="loading-skeleton order"><div class="line mid"></div><div class="line short"></div><div class="chips"><div class="chip"></div><div class="chip"></div><div class="chip"></div></div><div class="line"></div><div class="line mid"></div></div><div class="loading-skeleton order"><div class="line mid"></div><div class="line short"></div><div class="chips"><div class="chip"></div><div class="chip"></div></div><div class="line"></div></div>';
      }

      async function loadProducts() {
        const el = document.getElementById('catalog-list');
        showCatalogLoading();
        try {
          products = await api('/public/products');
          renderCatalog();
        } catch (err) {
          el.innerHTML = emptyStateHtml('📡', t('catalogLoadErrorTitle'), t('catalogLoadErrorHint'), t('retryButton'), 'data-retry="catalog"');
          el.querySelectorAll('[data-retry="catalog"]').forEach(function(btn) {
            btn.addEventListener('click', function() { loadProducts(); });
          });
        }
      }

      async function loadCart() {
        showCartLoading();
        cartLoadError = false;
        try {
          cart = await api('/public/cart');
        } catch (_) {
          cart = { items: [] };
          cartLoadError = true;
        }
        renderCatalog();
        renderCart();
        renderStickyCart();
      }

      async function loadOrders() {
        showOrdersLoading();
        ordersLoadError = false;
        try {
          orders = await api('/public/orders');
        } catch (_) {
          orders = [];
          ordersLoadError = true;
        }
        renderOrders();
      }

      function renderCatalog() {
        const el = document.getElementById('catalog-list');
        if (!products.length) {
          el.innerHTML = emptyStateHtml('🪑', t('noProductsTitle'), t('noProductsHint'), '', '');
          return;
        }
        el.innerHTML = products.map(function(product) {
          const cartItem = cart.items.find(function(item) { return item.product_id === product.id; });
          const weight = cartItem ? cartItem.weight : 0;
          const closed = product.status === 'closed' || product.status === 'cancelled';
          const imgUrl = normalizeImageUrl(product.image_url);
          const img = imgUrl
            ? '<span class="img-wrap"><img src="' + escapeAttr(imgUrl) + '" alt="" loading="eager" /><span class="img-overlay"><span class="hero-chip">' + escapeHtml(t('productCollectedShort')) + ' ' + product.total_weight + ' кг</span><span class="hero-chip soft">' + escapeHtml(t('productOrderCap')) + ' ' + (product.max_weight_per_order || 25) + ' кг</span></span><span class="no-img hidden">🪑</span></span>'
            : '<div class="no-img">🪑</div>';
          return '<div class="product-card" data-product-card="' + product.id + '">' +
            img +
            '<div class="product-info">' +
              '<div class="name">' + escapeHtml(product.name) + '</div>' +
              '<div class="meta">' + escapeHtml(product.article || '') + (product.thread_width ? ' · ' + escapeHtml(product.thread_width) : '') + (product.color ? ' · ' + escapeHtml(product.color) : '') + '</div>' +
              '<div class="weight"><span class="badge ' + escapeAttr(product.status) + '">' + escapeHtml(statusLabel(product.status)) + '</span>' + escapeHtml(t('catalogMin')) + ' ' + product.min_weight + ' кг · ' + escapeHtml(t('catalogCollected')) + ' ' + product.total_weight + ' кг · ' + escapeHtml(t('catalogOrderRange')) + ' ' + (product.max_weight_per_order || 25) + ' кг</div>' +
              '<div class="stats-line">' +
                '<span class="stat-pill">' + escapeHtml(product.article || '') + '</span>' +
                (product.thread_width ? '<span class="stat-pill">' + escapeHtml(product.thread_width) + '</span>' : '') +
                (product.color ? '<span class="stat-pill">' + escapeHtml(product.color) + '</span>' : '') +
              '</div>' +
              priceBoxHtml(product) +
              '<div class="product-actions-wrap">' + catalogActionHtml(product, weight) + '</div>' +
            '</div>' +
          '</div>';
        }).join('');
        bindCatalogActions(el);
      }

      function bindCatalogActions(root) {
        root.querySelectorAll('[data-action="add5"]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            add5(parseInt(btn.dataset.id, 10));
          });
        });
        root.querySelectorAll('[data-action="remove5"]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            remove5(parseInt(btn.dataset.id, 10));
          });
        });
        root.querySelectorAll('[data-open-cart]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            switchView('cart');
          });
        });
      }

      function setCartItemWeight(productId, weight) {
        var existing = cart.items.find(function(item) { return item.product_id === productId; });
        if (weight <= 0) {
          cart.items = cart.items.filter(function(item) { return item.product_id !== productId; });
          return;
        }
        if (existing) {
          existing.weight = weight;
          return;
        }
        cart.items.push({ product_id: productId, weight: weight });
      }

      function syncCatalogCard(productId) {
        var card = document.querySelector('[data-product-card="' + productId + '"]');
        var product = productById(productId);
        if (!card || !product) return;
        var item = cart.items.find(function(entry) { return entry.product_id === productId; });
        var weight = item ? item.weight : 0;
        var wrap = card.querySelector('.product-actions-wrap');
        if (!wrap) return;
        wrap.innerHTML = catalogActionHtml(product, weight);
        bindCatalogActions(wrap);
      }

      function renderCart() {
        const el = document.getElementById('cart-list');
        const summaryEl = document.getElementById('cart-summary');
        if (cartLoadError && !cart.items.length) {
          summaryEl.innerHTML = '';
          el.innerHTML = emptyStateHtml('📡', t('cartLoadErrorTitle'), t('cartLoadErrorHint'), t('retryButton'), 'data-retry="cart"');
          el.querySelectorAll('[data-retry="cart"]').forEach(function(btn) {
            btn.addEventListener('click', function() { loadCart(); });
          });
          return;
        }
        if (!cart.items.length) {
          summaryEl.innerHTML = '';
          el.innerHTML = emptyStateHtml('🧺', t('cartEmptyTitle'), t('cartEmptyHint'), t('emptyGoCatalog'), 'data-empty-go="catalog"');
          el.querySelectorAll('[data-empty-go]').forEach(function(btn) {
            btn.addEventListener('click', function() { switchView(btn.dataset.emptyGo); });
          });
          return;
        }
        summaryEl.innerHTML =
          '<div class="summary-card">' +
            '<div class="title">' + escapeHtml(t('cartSummaryTitle')) + '</div>' +
            '<div class="summary-grid">' +
              '<div class="summary-item"><div class="label">' + escapeHtml(t('cartSummaryItems')) + '</div><div class="value">' + cartItemsCount() + '</div></div>' +
              '<div class="summary-item"><div class="label">' + escapeHtml(t('cartSummaryWeight')) + '</div><div class="value">' + cartWeightTotal() + ' кг</div></div>' +
            '</div>' +
            '<div class="summary-footnote">' + escapeHtml(t('cartSummaryHint')) + '</div>' +
          '</div>';
        el.innerHTML = cart.items.map(function(item) {
          const product = productById(item.product_id);
          const productName = product ? product.name : t('unknownProduct') + item.product_id;
          const imgUrl = normalizeImageUrl(product && product.image_url);
          const img = imgUrl
            ? '<img src="' + escapeAttr(imgUrl) + '" alt="" class="cart-item-img" />'
            : '<div class="cart-item-no-img">🪑</div>';
          return '<div class="cart-item" data-cart-row="' + item.product_id + '">' +
            '<div class="top">' +
              img +
              '<div class="cart-item-body">' +
                '<div class="name">' + escapeHtml(productName) + '</div>' +
                '<div class="weight">' + escapeHtml(t('orderWeight')) + ': ' + item.weight + ' кг</div>' +
                '<div class="meta">' + escapeHtml((product && product.article) || '') + ((product && product.color) ? ' · ' + escapeHtml(product.color) : '') + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="actions-inline">' +
              '<button type="button" class="step remove" data-cart-remove="' + item.product_id + '">−</button>' +
              '<span class="qty">' + item.weight + ' кг</span>' +
              '<button type="button" class="step" data-cart-add="' + item.product_id + '">+</button>' +
              '<button type="button" class="checkout-btn" data-cart-checkout="' + item.product_id + '">' + escapeHtml(t('checkoutItem')) + '</button>' +
            '</div>' +
          '</div>';
        }).join('');
        el.querySelectorAll('[data-cart-add]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            add5(parseInt(btn.dataset.cartAdd, 10), true);
          });
        });
        el.querySelectorAll('[data-cart-remove]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            remove5(parseInt(btn.dataset.cartRemove, 10), true);
          });
        });
        el.querySelectorAll('[data-cart-checkout]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            openCheckout(parseInt(btn.dataset.cartCheckout, 10));
          });
        });
      }

      function renderOrdersFilters() {
        const root = document.getElementById('orders-filters');
        if (!root) return;
        const items = [
          { id: 'all', label: t('allOrders') },
          { id: 'pending', label: t('pendingOrders') },
          { id: 'confirmed', label: t('confirmedOrders') },
          { id: 'completed', label: t('completedOrders') },
          { id: 'received', label: t('receivedOrders') },
          { id: 'cancelled', label: t('cancelledOrders') }
        ];
        root.innerHTML = items.map(function(item) {
          return '<button type="button" data-order-filter="' + item.id + '"' + (activeOrderFilter === item.id ? ' class="active"' : '') + '>' + escapeHtml(item.label) + '</button>';
        }).join('');
        root.querySelectorAll('[data-order-filter]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            activeOrderFilter = btn.dataset.orderFilter;
            renderOrdersFilters();
            renderOrders();
          });
        });
      }

      function renderOrders() {
        const el = document.getElementById('orders-list');
        const visibleOrders = activeOrderFilter === 'all'
          ? orders
          : orders.filter(function(order) { return order.status === activeOrderFilter; });
        if (ordersLoadError && !visibleOrders.length) {
          el.innerHTML = emptyStateHtml('📡', t('ordersLoadErrorTitle'), t('ordersLoadErrorHint'), t('retryButton'), 'data-retry="orders"');
          el.querySelectorAll('[data-retry="orders"]').forEach(function(btn) {
            btn.addEventListener('click', function() { loadOrders(); });
          });
          return;
        }
        if (!visibleOrders.length) {
          el.innerHTML = emptyStateHtml('📦', t('ordersEmptyTitle'), t('ordersEmptyHint'), t('emptyGoCatalog'), 'data-empty-go="catalog"');
          el.querySelectorAll('[data-empty-go]').forEach(function(btn) {
            btn.addEventListener('click', function() { switchView(btn.dataset.emptyGo); });
          });
          return;
        }
        el.innerHTML = visibleOrders.map(function(order) {
          const name = order.product_name || (t('unknownProduct') + order.product_id);
          const imgUrl = normalizeImageUrl(order.product_image_url);
          const img = imgUrl
            ? '<img src="' + escapeAttr(imgUrl) + '" alt="" class="order-card-img" />'
            : '<div class="order-card-no-img">🪑</div>';
          const address = order.delivery_address ? '<div class="detail-line with-icon"><span class="icon">📍</span><span><span class="label">' + escapeHtml(t('orderAddress')) + '</span>' + escapeHtml(order.delivery_address) + '</span></div>' : '';
          const comment = order.comment ? '<div class="detail-line with-icon"><span class="icon">💬</span><span><span class="label">' + escapeHtml(t('orderComment')) + '</span>' + escapeHtml(order.comment) + '</span></div>' : '';
          const action = order.status === 'completed'
            ? '<div class="hint-box">' + escapeHtml(t('orderCompletedHint')) + '</div><div class="actions"><button type="button" data-order-received="' + order.id + '">' + escapeHtml(t('orderConfirmReceived')) + '</button></div>'
            : '';
          const timeline = buildOrderTimeline(order.status);
          return '<div class="order-card">' +
            '<div class="top">' +
              img +
              '<div class="order-card-body">' +
                '<div class="row"><span><strong>' + escapeHtml(name) + '</strong></span><span>' + order.weight_total + ' кг</span></div>' +
                '<div class="meta">' + escapeHtml(order.product_article || '') + (order.product_thread_width ? ' · ' + escapeHtml(order.product_thread_width) : '') + (order.product_color ? ' · ' + escapeHtml(order.product_color) : '') + '</div>' +
                '<div class="row"><span class="status ' + escapeAttr(order.status) + '">' + escapeHtml(statusIcon(order.status) + ' ' + orderStatusLabel(order.status)) + '</span><span>' + escapeHtml(formatOrderDate(order.created_at)) + '</span></div>' +
              '</div>' +
            '</div>' +
            '<div class="details">' +
              '<div class="detail-line with-icon"><span class="icon">' + escapeHtml(fulfillmentIcon(order.fulfillment_type)) + '</span><span><span class="label">' + escapeHtml(t('orderDelivery')) + '</span>' + escapeHtml(fulfillmentLabel(order.fulfillment_type)) + '</span></div>' +
              '<div class="detail-line with-icon"><span class="icon">⚖</span><span><span class="label">' + escapeHtml(t('orderWeight')) + '</span>' + order.weight_total + ' кг</span></div>' +
              address +
              comment +
            '</div>' +
            timeline +
            action +
          '</div>';
        }).join('');
        el.querySelectorAll('[data-order-received]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            confirmReceived(parseInt(btn.dataset.orderReceived, 10));
          });
        });
      }

      function openCheckout(productId) {
        const item = cart.items.find(function(entry) { return entry.product_id === productId; });
        const product = productById(productId);
        if (!item || !product) {
          showToast(t('cartEmptyHint'));
          return;
        }
        var minWeight = 5;
        if (item.weight < minWeight) {
          var msg = t('checkoutMinWeightError').replace('{min}', String(minWeight));
          showToast(msg);
          return;
        }
        var maxWeight = product.max_weight_per_order || 25;
        if (item.weight > maxWeight) {
          var msgMax = t('checkoutMaxWeightError').replace('{max}', String(maxWeight));
          showToast(msgMax);
          return;
        }
        document.getElementById('checkout-product-id').value = String(productId);
        document.getElementById('checkout-error').textContent = '';
        document.getElementById('checkout-success').textContent = '';
        document.getElementById('delivery-address').value = '';
        document.getElementById('comment').value = '';
        document.getElementById('fulfillment-type').value = getStoredFulfillment();
        var tier = priceTierData(product.total_weight);
        var currency = t('priceCurrency');
        var estimated = (Number(item.weight) || 0) * (Number(tier.price) || 0);
        document.getElementById('checkout-summary').innerHTML =
          '<div class="title">' + escapeHtml(product.name) + '</div>' +
          '<div class="meta">' + escapeHtml(product.article || '') + (product.color ? ' · ' + escapeHtml(product.color) : '') + '</div>' +
          '<div class="summary-grid">' +
            '<div class="summary-item"><div class="label">' + escapeHtml(t('checkoutSummaryWeight')) + '</div><div class="value">' + item.weight + ' кг</div></div>' +
            '<div class="summary-item"><div class="label">' + escapeHtml(t('checkoutSummaryStatus')) + '</div><div class="value">' + escapeHtml(statusLabel(product.status)) + '</div></div>' +
            '<div class="summary-item"><div class="label">' + escapeHtml(t('checkoutPricePerKg')) + '</div><div class="value">' + escapeHtml(formatMoney(tier.price)) + ' ' + escapeHtml(currency) + '</div></div>' +
            '<div class="summary-item"><div class="label">' + escapeHtml(t('checkoutEstimatedTotal')) + '</div><div class="value">' + escapeHtml(formatMoney(estimated)) + ' ' + escapeHtml(currency) + '</div></div>' +
          '</div>' +
          '<div class="accent-note" id="checkout-accent-note"></div>';
        toggleDeliveryField();
        switchView('checkout');
      }
      
      function updateFulfillmentNote() {
        var sel = document.getElementById('fulfillment-type').value;
        var note = document.getElementById('checkout-accent-note');
        if (!note) return;
        var textKey;
        if (sel === 'pickup') textKey = 'checkoutAccentNotePickup';
        else if (sel === 'delivery') textKey = 'checkoutAccentNoteDelivery';
        else if (sel === 'uzum_market') textKey = 'checkoutAccentNoteUzum';
        else textKey = null;
        var text = textKey ? t(textKey) : '';
        note.textContent = fulfillmentIcon(sel) + ' ' + text;
      }

      function toggleDeliveryField() {
        const sel = document.getElementById('fulfillment-type').value;
        const group = document.getElementById('delivery-address-group');
        const input = document.getElementById('delivery-address');
        group.style.display = 'block';
        group.classList.toggle('open', sel === 'delivery');
        input.required = sel === 'delivery';
        if (sel === 'delivery') {
          input.placeholder = t('deliveryAddressPlaceholder');
        } else {
          input.placeholder = '';
          input.value = '';
          input.classList.remove('error');
          var errEl = document.getElementById('checkout-error');
          if (errEl && errEl.textContent === t('deliveryAddressLabel')) {
            errEl.textContent = '';
          }
        }
        updateFulfillmentNote();
      }

      async function add5(productId, keepView) {
        try {
          var product = productById(productId);
          if (product) {
            var currentItem = cart.items.find(function(entry) { return entry.product_id === productId; });
            var currentWeight = currentItem ? currentItem.weight : 0;
            var maxWeight = product.max_weight_per_order || 25;
            if (currentWeight + 5 > maxWeight) {
              var msgMax = t('checkoutMaxWeightError').replace('{max}', String(maxWeight));
              showToast(msgMax);
              return;
            }
          }
          var item = await api('/public/cart/' + productId + '/add5', { method: 'POST' });
          setCartItemWeight(productId, item.weight);
          syncCatalogCard(productId);
          renderStickyCart();
          if (currentView === 'cart') {
            renderCart();
          }
          animateWeightCounters(productId);
          bumpCartUi(productId);
        } catch (err) {
          showToast(err.message);
        }
      }

      async function remove5(productId, keepView) {
        try {
          var item = await api('/public/cart/' + productId + '/remove5', { method: 'POST' });
          setCartItemWeight(productId, item ? item.weight : 0);
          syncCatalogCard(productId);
          renderStickyCart();
          if (currentView === 'cart') {
            renderCart();
          }
          animateWeightCounters(productId);
        } catch (err) {
          showToast(err.message);
        }
      }

      async function confirmReceived(orderId) {
        try {
          await api('/public/orders/' + orderId + '/received', { method: 'POST' });
          await loadOrders();
          showToast(t('receivedSuccess'));
          switchView('orders');
        } catch (err) {
          showToast(err.message);
        }
      }

      async function changeLanguage(lang) {
        try {
          me = await api('/public/me/language', {
            method: 'PATCH',
            body: JSON.stringify({ language: lang })
          });
          currentLang = me.language || lang;
          setStoredLang(currentLang);
          applyStaticTexts();
          renderProfileBanner();
          renderCatalog();
          renderCart();
          renderOrders();
          renderStickyCart();
        } catch (err) {
          showToast(err.message);
        }
      }

      function bumpCartUi(productId) {
        const card = document.querySelector('[data-product-card="' + productId + '"]');
        const bar = document.getElementById('sticky-cart-bar');
        if (card) {
          card.classList.remove('bump');
          void card.offsetWidth;
          card.classList.add('bump');
          setTimeout(function() { card.classList.remove('bump'); }, 420);
        }
        if (bar) {
          bar.classList.remove('bump');
          void bar.offsetWidth;
          bar.classList.add('bump');
          setTimeout(function() { bar.classList.remove('bump'); }, 420);
        }
      }

      document.getElementById('cart-back').addEventListener('click', function() {
        switchView('catalog');
      });
      document.getElementById('checkout-back').addEventListener('click', function() {
        switchView('cart');
      });
      document.getElementById('sticky-cart-open').addEventListener('click', function() {
        switchView('cart');
      });
      document.getElementById('lang-ru').addEventListener('click', function() { changeLanguage('ru'); });
      document.getElementById('lang-uz').addEventListener('click', function() { changeLanguage('uz'); });
      document.getElementById('fulfillment-type').addEventListener('change', toggleDeliveryField);
      document.getElementById('theme-toggle').addEventListener('click', function() {
        var current = document.body.dataset.theme === 'dark' ? 'dark' : 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        setStoredTheme(next);
        applyTheme(next);
      });
      if (tg && tg.onEvent) {
        tg.onEvent('themeChanged', function() {
          var stored = getStoredTheme();
          applyTheme(stored || tgThemePreference() || 'light');
        });
      }
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState !== 'visible') return;
        refreshOnResume();
      });
      window.addEventListener('focus', function() {
        refreshOnResume();
      });
      window.addEventListener('pageshow', refreshOnResume);
      document.querySelectorAll('.tabs button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          switchView(btn.dataset.tab);
          if (btn.dataset.tab === 'orders') loadOrders();
          if (btn.dataset.tab === 'catalog') {
            loadMe();
            loadProducts();
          }
        });
      });

      document.getElementById('checkout-form').addEventListener('submit', async function(event) {
        event.preventDefault();
        if (checkoutSubmitting) return;
        if (!me || !me.has_phone) {
          showToast(t('phoneRequired'));
          return;
        }
        const productId = parseInt(document.getElementById('checkout-product-id').value, 10);
        const product = productById(productId);
        if (product && (product.status === 'closed' || product.status === 'cancelled')) {
          showToast(t('checkoutBatchClosed'));
          return;
        }
        const fulfillmentType = document.getElementById('fulfillment-type').value;
        const deliveryAddressInput = document.getElementById('delivery-address');
        const rawDeliveryAddress = deliveryAddressInput.value.trim();
        const deliveryAddress = rawDeliveryAddress || null;
        const comment = document.getElementById('comment').value.trim() || null;
        const errEl = document.getElementById('checkout-error');
        const okEl = document.getElementById('checkout-success');
        const btn = document.getElementById('checkout-submit');
        deliveryAddressInput.classList.remove('error');
        errEl.textContent = '';
        errEl.innerHTML = '';
        okEl.textContent = '';
        if (fulfillmentType === 'delivery' && !rawDeliveryAddress) {
          deliveryAddressInput.classList.add('error');
          errEl.textContent = t('deliveryAddressLabel');
          return;
        }
        checkoutSubmitting = true;
        btn.disabled = true;
        btn.classList.add('loading');
        try {
          var createdOrder = await api('/public/orders/' + productId, {
            method: 'POST',
            body: JSON.stringify({
              fulfillment_type: fulfillmentType,
              delivery_address: deliveryAddress,
              comment: comment
            })
          });
          setStoredFulfillment(fulfillmentType);
          okEl.textContent = t('checkoutSuccess');
          await loadCart();
          await loadOrders();
          renderCatalog();
          lastSuccessOrder = createdOrder;
          renderSuccessScene(createdOrder);
          switchView('success');
        } catch (err) {
          errEl.innerHTML = escapeHtml(err.message) + '<br><span class="checkout-error-hint">' + escapeHtml(t('checkoutErrorHint')) + '</span>';
        } finally {
          checkoutSubmitting = false;
          btn.disabled = false;
          btn.classList.remove('loading');
        }
      });

      async function init() {
        await waitForInitData(1800);
        applyTheme(getStoredTheme() || tgThemePreference() || 'light');
        await loadMe();
        await loadProducts();
        await loadCart();
        await loadOrders();
        switchView('catalog');
      }

      init();
    })();
  </script>
</body>
</html>
